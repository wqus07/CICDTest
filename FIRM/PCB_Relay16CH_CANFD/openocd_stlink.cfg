# OpenOCD configuration for STM32H750 with ST-Link v2/v3

# Set the interface
source [find interface/stlink.cfg]

# Set the target
source [find target/stm32h7x.cfg]

# Debug speed (in kHz)
adapter speed 1000

# Connection timeout
set _CONNECT_UNDER_RESET 1

# Initialize the target
init
echo "STM32H750 with ST-Link connected"
