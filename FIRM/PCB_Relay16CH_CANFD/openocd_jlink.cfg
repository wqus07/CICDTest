# OpenOCD configuration for STM32H750 with J-Link

# Set the interface
source [find interface/jlink.cfg]

# Set the target
source [find target/stm32h7x.cfg]

# Set J-Link speed (in kHz)
adapter speed 1000

# Set specific J-Link options
jlink usb 0

# Connection options
set _CONNECT_UNDER_RESET 1

# Initialize the target
init
echo "STM32H750 with J-Link connected"
